<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow / Background -->
  <circle cx="100" cy="100" r="90" fill="#f9faec" stroke="#a0cc5b" stroke-width="4" stroke-dasharray="10 5" />
  
  <!-- Stylized Kiwi Base -->
  <path d="M150 100C150 127.614 127.614 150 100 150C72.3858 150 50 127.614 50 100C50 72.3858 72.3858 50 100 50C127.614 50 150 72.3858 150 100Z" fill="#a0cc5b" />
  
  <!-- Kiwi Seeds / Code Brackets Interior -->
  <circle cx="100" cy="100" r="30" fill="white" />
  
  <!-- Code Brackets -->
  <path d="M85 85L70 100L85 115" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M115 85L130 100L115 115" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Center Dot -->
  <circle cx="100" cy="100" r="8" fill="#a0cc5b" />
  
  <!-- Little Sparkle -->
  <circle cx="140" cy="65" r="8" fill="#ffd700" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
  
</svg>
