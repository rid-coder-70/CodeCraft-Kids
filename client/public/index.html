<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Adventure Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f9faec;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #0f172a;
        }

        .map-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            position: relative;
        }

        .level-node {
            width: 180px;
            height: 180px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .level-node:hover {
            transform: translateY(-10px);
            border-color: #a0cc5b;
            box-shadow: 0 10px 15px -3px rgba(160, 204, 91, 0.2);
        }

        .level-node.locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        .level-node.locked:hover {
            transform: none;
            border-color: #e2e8f0;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .label {
            font-weight: 700;
            font-size: 1rem;
            color: #475569;
        }

        .lock-icon {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 1.2rem;
        }

        .connector {
            position: absolute;
            height: 4px;
            background: #e2e8f0;
            z-index: -1;
        }

        .btn-start {
            margin-top: 3rem;
            padding: 1rem 3rem;
            background-color: #a0cc5b;
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(160, 204, 91, 0.4);
        }

        .btn-start:hover {
            background-color: #8ebb4a;
        }
        
    </style>
</head>
<body>
    <div class="container" id="welcomeScreen">
        <h1>Welcome to Python Island! 🏝️</h1>
        <p style="font-size: 1.2rem; color: #64748b; margin-bottom: 2.5rem;">Ready to start your coding adventure?</p>
        <button class="btn-start" onclick="startMap()">Get Started</button>
    </div>

    <div class="container" id="mapScreen" style="display: none;">
        <h1>Python Adventure Map</h1>
        <div class="map-grid">
            <div class="level-node" onclick="window.location.href='learn-print.html'">
                <div class="icon">🎯</div>
                <div class="label">Level 1: Print Quest</div>
            </div>
            
            <div class="level-node locked" onclick="alert('Complete Level 1 first!')">
                <div class="lock-icon">🔒</div>
                <div class="icon">📦</div>
                <div class="label">Level 2: Variables</div>
            </div>

            <div class="level-node locked" onclick="alert('Complete Level 2 first!')">
                <div class="lock-icon">🔒</div>
                <div class="icon">🔢</div>
                <div class="label">Level 3: Logic</div>
            </div>
        </div>
    </div>

    <script>
        function startMap() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mapScreen').style.display = 'block';
        }
    </script>
</body>
</html>
