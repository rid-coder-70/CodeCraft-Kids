<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3: Math Mountain</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background-color: #e0f2fe; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .adventure-card { background: white; border-radius: 2.5rem; padding: 3rem; max-width: 700px; width: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 2px solid #bae6fd; text-align: center; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .lvl-badge { background: #0ea5e9; color: white; padding: 0.5rem 1.5rem; border-radius: 99rem; font-weight: 800; font-size: 0.85rem; display: inline-block; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3); }
        h1 { font-size: 2.25rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }
        p { font-size: 1.15rem; color: #64748b; line-height: 1.7; margin-bottom: 2rem; }
        .interaction-area { background-color: #f0f9ff; border-radius: 1.5rem; padding: 2rem; margin-bottom: 2.5rem; border: 1px dashed #0ea5e9; }
        code { background: #0f172a; color: #4ade80; padding: 1rem 1.5rem; border-radius: 1rem; font-family: 'Monaco', 'Consolas', monospace; display: block; margin-bottom: 1.5rem; font-size: 1.25rem; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); }
        .math { color: #38bdf8; }
        .btn-next { display: inline-block; width: 100%; background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; border: none; border-radius: 1.25rem; padding: 1.25rem; font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4); text-decoration: none; }
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(14, 165, 233, 0.5); }
        .back-link { display: inline-block; margin-top: 2rem; color: #94a3b8; text-decoration: none; font-weight: 700; font-size: 0.95rem; }
        .back-link:hover { color: #0ea5e9; text-decoration: underline; }
        .character { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
    </style>
</head>
<body>
    <div class="adventure-card">
        <div class="header">
            <span class="lvl-badge">LEVEL 3</span>
            <span class="character">➕</span>
            <h1>Super Math Multipliers!</h1>
            <p>Python is a super-fast calculator. It can do tricky math in a blink! Forget your fingers, use code!</p>
        </div>

        <div class="interaction-area">
            <code><span class="math">result</span> = 10 + 5 * 2<br>print(<span class="math">result</span>)</code>
            <p style="font-size: 0.95rem; margin-bottom: 0;">What do you think is inside? 10 + 10 = 20! Python is a math genius!</p>
        </div>

        <button onclick="completeLevel()" class="btn-next">Climb On! ⛰️💎</button>
        <a href="map.html" class="back-link">Back to Adventure Map</a>
    </div>

    <script>
        function completeLevel() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#0ea5e9', '#ffffff', '#ffd700'] });
            window.parent.postMessage({ type: 'LEVEL_COMPLETE', level: 4 }, '*');
            setTimeout(() => { window.location.href = 'map.html'; }, 2500);
        }
    </script>
</body>
</html>
