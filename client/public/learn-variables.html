<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Python Variables</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f9faec;
            color: #1e293b;
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lesson-card {
            background: white;
            border-radius: 2rem;
            padding: 3rem;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 2rem;
            text-align: center;
        }

        .lesson-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #475569;
            margin-bottom: 2rem;
        }

        .code-block {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            font-family: monospace;
            font-size: 1.25rem;
            color: #047857;
            margin-bottom: 2rem;
        }

        .keyword { color: #d946ef; }
        .variable { color: #3b82f6; }
        .value { color: #f59e0b; }

        .visual-box {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: #f0fdfa;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid #ccfbf1;
            margin-bottom: 2rem;
        }

        .btn-next {
            display: block;
            width: 100%;
            background-color: #a0cc5b;
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 1.25rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 6px -1px rgba(160, 204, 91, 0.4);
        }

        .btn-next:hover {
            background-color: #8ebb4a;
        }
        
    </style>
</head>
<body>
    <div class="lesson-card">
        <h1>Level 2: The Variable Box</h1>
        
        <div class="lesson-content">
            <p>A <strong>Variable</strong> is like a box that stores information. You give the box a name, and put something inside it!</p>
        </div>

        <div class="visual-box">
            <span style="font-size: 3rem;">📦</span>
            <div>
                <p style="font-weight: 800; color: #0d9488;">Variable Name: name</p>
                <p style="color: #64748b;">Stores: "Dora"</p>
            </div>
        </div>

        <div class="code-block">
            <span class="variable">name</span> = <span class="value">"Dora"</span><br>
            <span class="keyword">print</span>(<span class="variable">name</span>)
        </div>

        <a href="challenge-variables.html" class="btn-next">Start Variable Challenges</a>
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="index.html" style="color: #94a3b8; text-decoration: none; font-weight: 600;">Back to Map</a>
        </div>
    </div>
</body>
</html>
