<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5: Master Coder</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .adventure-card { background: white; border-radius: 2.5rem; padding: 4rem 3rem; max-width: 700px; width: 100%; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); border: 2px solid #6366f1; text-align: center; color: #1e293b; }
        .lvl-badge { background: #6366f1; color: white; padding: 0.5rem 1.5rem; border-radius: 99rem; font-weight: 800; font-size: 0.85rem; display: inline-block; margin-bottom: 1.5rem; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }
        h1 { font-size: 2.5rem; font-weight: 900; color: #0f172a; margin-bottom: 1rem; }
        p { font-size: 1.15rem; color: #64748b; line-height: 1.7; margin-bottom: 2.5rem; }
        .interaction-area { background-color: #f5f3ff; border-radius: 1.5rem; padding: 2.5rem; margin-bottom: 3rem; border: 2px solid #6366f1; }
        .congrats-text { font-size: 1.35rem; font-weight: 800; color: #4338ca; margin-bottom: 1rem; }
        .btn-next { display: inline-block; width: 100%; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border: none; border-radius: 1.25rem; padding: 1.5rem; font-size: 1.5rem; font-weight: 900; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); text-decoration: none; }
        .btn-next:hover { transform: scale(1.03) rotate(1deg); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6); }
        .back-link { display: inline-block; margin-top: 2rem; color: #94a3b8; text-decoration: none; font-weight: 700; font-size: 0.95rem; }
        .back-link:hover { color: #6366f1; text-decoration: underline; }
        .character { font-size: 5rem; margin-bottom: 1.5rem; display: block; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <div class="adventure-card">
        <div class="header">
            <span class="lvl-badge">FINAL QUEST</span>
            <span class="character">👑</span>
            <h1>The Master Coder!</h1>
            <p>You've done it! You learned how to shout, store secrets, solve math, and ask questions. You are now a <strong>True Python Master!</strong></p>
        </div>

        <div class="interaction-area">
            <p class="congrats-text">🏆 Python Certification Unlocked! 📜</p>
            <p style="font-size: 1rem; margin-bottom: 0;">You've earned the rarest "Master Coder" badge and 50 extra gems!</p>
        </div>

        <button onclick="completeLevel()" class="btn-next">Claim Master Badge! 🎖️💎</button>
        <a href="map.html" class="back-link">Return Home</a>
    </div>

    <script>
        function completeLevel() {
            confetti({ particleCount: 300, spread: 150, origin: { y: 0.5 }, colors: ['#6366f1', '#ffd700', '#ffffff', '#4ade80'] });
            window.parent.postMessage({ type: 'LEVEL_COMPLETE', level: 6 }, '*');
            setTimeout(() => { window.location.href = 'map.html'; }, 3500);
        }
    </script>
</body>
</html>
